<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>audioplayer</title>
</head>
<body>
    <br><br><br><br><br>
    <div class="wrap">
        <div class="player">
            <div class="cover"><img class="img" src="" alt=""></div>
            <div class="info">
                <div class="title text"></div>
                <div class="artist text"></div>
            </div>
            <input class="progress" type="range">
            <div class="song_time">
                <p class="current_time"></p>
                <p class="song_duration"></p>
            </div>
            <div class="buttonsh">
                <img class="mix but" src="images/mixsongbutton.svg" alt="">
                <img class="prev but" src="images/prevsongbutton.svg" alt="">
                <img class="playpause but" src="images/playsongbutton.svg" alt="">
                <img class="next but" src="images/nextsongbutton.svg" alt="">
                <img class="repeat but" src="images/repeatsongbutton.svg" alt="">
            </div>
        </div>
    </div>



    <script src="java_script/main.js"></script>
</body>
</html>
